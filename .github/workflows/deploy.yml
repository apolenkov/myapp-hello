---
name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/myapp-api

jobs:
  # ── Build & Push to GHCR ───────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-sha: ${{ github.sha }}
      image-short-sha: ${{ steps.image-ref.outputs.short_sha }}
      image-ref: ${{ steps.image-ref.outputs.image_ref }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Compute deploy image reference
        id: image-ref
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "image_ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: SENTRY_RELEASE=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Scan image for vulnerabilities ─────────────────────────────────────
  scan-image:
    name: Trivy Security Scan
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ needs.build-and-push.outputs.image-ref }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          scanners: vuln

  # ── Deploy to dev (auto) ───────────────────────────────────────────────
  deploy-dev:
    needs: [build-and-push, scan-image]
    uses: ./.github/workflows/deploy-env.yml
    with:
      environment: dev
    secrets:
      DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
      DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
      DOKPLOY_SERVICE_ID: ${{ secrets.DOKPLOY_SERVICE_ID }}
      APP_PUBLIC_URL: ${{ secrets.APP_PUBLIC_URL }}

  # ── Deploy to staging (manual approval via GitHub Environment) ─────────
  deploy-staging:
    needs: deploy-dev
    uses: ./.github/workflows/deploy-env.yml
    with:
      environment: staging
    secrets:
      DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
      DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
      DOKPLOY_SERVICE_ID: ${{ secrets.DOKPLOY_SERVICE_ID }}
      APP_PUBLIC_URL: ${{ secrets.APP_PUBLIC_URL }}

  # ── Deploy to production (manual approval via GitHub Environment) ──────
  deploy-production:
    needs: deploy-staging
    uses: ./.github/workflows/deploy-env.yml
    with:
      environment: production
      is_production: true
    secrets:
      DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
      DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
      DOKPLOY_SERVICE_ID: ${{ secrets.DOKPLOY_SERVICE_ID }}
      APP_PUBLIC_URL: ${{ secrets.APP_PUBLIC_URL }}
      GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
      GRAFANA_API_TOKEN: ${{ secrets.GRAFANA_API_TOKEN }}
      GRAFANA_TEMPO_QUERY_URL: ${{ secrets.GRAFANA_TEMPO_QUERY_URL }}
      GRAFANA_TEMPO_USER: ${{ secrets.GRAFANA_TEMPO_USER }}
      GRAFANA_TEMPO_READ_TOKEN: ${{ secrets.GRAFANA_TEMPO_READ_TOKEN }}
      GRAFANA_TEMPO_DATASOURCE_UID: ${{ secrets.GRAFANA_TEMPO_DATASOURCE_UID }}
