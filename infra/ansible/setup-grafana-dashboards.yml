---
# Ansible playbook: provision Grafana Cloud dashboards and alert rules
#
# Prerequisites:
#   - Grafana Cloud account with access policy token
#   - Token scopes: dashboards:write, folders:write, alert.provisioning:write
#
# Usage:
#   ansible-playbook infra/ansible/setup-grafana-dashboards.yml \
#     -e @infra/ansible/vars/secrets.yml --ask-vault-pass
#
# Tags:
#   dashboards  — import dashboards only
#   alerts      — import alert rules only
#   (no tag)    — import both
#
# Idempotent: updates existing dashboards/rules (overwrite: true).

- name: Provision Grafana Cloud dashboards and alert rules
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    folder_title: myapp-hello
    folder_uid: myapp-hello
    dashboard_dir: '{{ playbook_dir }}/../observability/grafana/dashboards'
    alerts_file: '{{ playbook_dir }}/../observability/grafana/alerts/alert-rules.yml'

  tasks:
    # ── Step 1: Create or find folder ───────────────────────────────────
    - name: Check if folder exists
      ansible.builtin.uri:
        url: '{{ grafana_url }}/api/folders/{{ folder_uid }}'
        method: GET
        headers:
          Authorization: 'Bearer {{ grafana_api_token }}'
        status_code: [200, 404]
        return_content: true
      register: folder_check

    - name: Create folder
      ansible.builtin.uri:
        url: '{{ grafana_url }}/api/folders'
        method: POST
        headers:
          Authorization: 'Bearer {{ grafana_api_token }}'
          Content-Type: application/json
        body_format: json
        body:
          uid: '{{ folder_uid }}'
          title: '{{ folder_title }}'
        status_code: [200, 201]
        return_content: true
      register: folder_create
      when: folder_check.status == 404

    - name: Set folder UID
      ansible.builtin.set_fact:
        resolved_folder_uid: '{{ folder_uid }}'

    - name: Show folder
      ansible.builtin.debug:
        msg: 'Folder "{{ folder_title }}" — UID: {{ resolved_folder_uid }} ({{ "existing" if folder_check.status == 200 else "created" }})'

    # ── Step 2: Discover dashboard files ────────────────────────────────
    - name: Find dashboard JSON files
      ansible.builtin.find:
        paths: '{{ dashboard_dir }}'
        patterns: '*.json'
      register: dashboard_files
      tags: [dashboards]

    - name: Show discovered dashboards
      ansible.builtin.debug:
        msg: 'Found {{ dashboard_files.files | length }} dashboard(s): {{ dashboard_files.files | map(attribute="path") | map("basename") | list }}'
      tags: [dashboards]

    # ── Step 3: Import dashboards ───────────────────────────────────────
    - name: Read dashboard JSON files
      ansible.builtin.slurp:
        src: '{{ item.path }}'
      loop: '{{ dashboard_files.files }}'
      loop_control:
        label: '{{ item.path | basename }}'
      register: dashboard_contents
      tags: [dashboards]

    - name: Import dashboards to Grafana
      ansible.builtin.uri:
        url: '{{ grafana_url }}/api/dashboards/db'
        method: POST
        headers:
          Authorization: 'Bearer {{ grafana_api_token }}'
          Content-Type: application/json
        body_format: json
        body:
          dashboard: '{{ item.content | b64decode | from_json }}'
          folderUid: '{{ resolved_folder_uid }}'
          overwrite: true
          message: 'Provisioned by Ansible'
        status_code: [200, 201]
        return_content: true
      loop: '{{ dashboard_contents.results }}'
      loop_control:
        label: '{{ item.source | basename }}'
      register: import_results
      tags: [dashboards]

    - name: Show import results
      ansible.builtin.debug:
        msg: '{{ item.item.source | basename }}: {{ item.json.status | default("imported") }} — {{ grafana_url }}{{ item.json.url | default("") }}'
      loop: '{{ import_results.results }}'
      loop_control:
        label: '{{ item.item.source | basename }}'
      tags: [dashboards]

    # ── Step 4: Import alert rules ──────────────────────────────────────
    - name: Read alert rules file
      ansible.builtin.slurp:
        src: '{{ alerts_file }}'
      register: alerts_content
      tags: [alerts]

    - name: Parse alert rules
      ansible.builtin.set_fact:
        alert_config: '{{ alerts_content.content | b64decode | from_yaml }}'
      tags: [alerts]

    - name: Create alert rules
      ansible.builtin.uri:
        url: '{{ grafana_url }}/api/v1/provisioning/alert-rules'
        method: POST
        headers:
          Authorization: 'Bearer {{ grafana_api_token }}'
          Content-Type: application/json
          X-Disable-Provenance: 'true'
        body_format: json
        body:
          orgId: 1
          folderUID: '{{ resolved_folder_uid }}'
          ruleGroup: '{{ alert_config.groups[0].name }}'
          title: '{{ item.title }}'
          condition: '{{ item.condition }}'
          for: '{{ item.for }}'
          labels: '{{ item.labels }}'
          annotations: '{{ item.annotations }}'
          data: '{{ item.data }}'
          noDataState: NoData
          execErrState: Error
        status_code: [200, 201]
        return_content: true
      loop: '{{ alert_config.groups[0].rules }}'
      loop_control:
        label: '{{ item.title }}'
      register: alert_results
      tags: [alerts]
      # Ignore 409 Conflict (rule already exists) — update handled separately
      failed_when: alert_results.status not in [200, 201, 409]

    - name: Show alert results
      ansible.builtin.debug:
        msg: '{{ item.item.title }}: {{ "created" if item.status in [200, 201] else "already exists" }}'
      loop: '{{ alert_results.results }}'
      loop_control:
        label: '{{ item.item.title }}'
      tags: [alerts]

    # ── Summary ─────────────────────────────────────────────────────────
    - name: Summary
      ansible.builtin.debug:
        msg: |
          Grafana provisioning complete:
            - Folder: {{ folder_title }} ({{ resolved_folder_uid }})
            - Dashboards: {{ dashboard_files.files | length }} imported
            - Alert rules: {{ alert_config.groups[0].rules | length }} provisioned
            - URL: {{ grafana_url }}/dashboards/f/{{ resolved_folder_uid }}
