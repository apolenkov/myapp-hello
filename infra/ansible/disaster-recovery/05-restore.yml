- name: Restore from R2 backup
  hosts: vps
  vars_files: [../vars/vault.yml]
  vars:
    environments:
      - name: prod
        db: "{{ db_name_prod | default('myapp_prod') }}"
      - name: staging
        db: "{{ db_name_staging | default('myapp_staging') }}"
      - name: dev
        db: "{{ db_name_dev | default('myapp_dev') }}"
  tasks:
    - name: Find latest backup
      ansible.builtin.shell: rclone lsf r2:myapp-backups --dirs-only | sort | tail -1 | tr -d '/'
      register: latest_backup
      changed_when: false
      failed_when: latest_backup.stdout == ''

    - name: Download latest backup
      ansible.builtin.shell: rclone copy "r2:myapp-backups/{{ latest_backup.stdout }}" /tmp/restore/
      args:
        creates: /tmp/restore/postgres

    - name: Restore Dokploy config
      ansible.posix.synchronize:
        src: /tmp/restore/configs/dokploy/
        dest: /etc/dokploy/
        delete: false

    - name: Find PostgreSQL container for {{ item.name }}
      ansible.builtin.shell: docker ps --filter name="pg-{{ item.name }}" --format "{% raw %}{{.Names}}{% endraw %}" | head -1
      register: pg_containers
      changed_when: false
      loop: '{{ environments }}'
      loop_control:
        label: '{{ item.name }}'

    - name: Check dump file exists for {{ item.item.name }}
      ansible.builtin.stat:
        path: '/tmp/restore/postgres/myapp_{{ item.item.name }}.sql.gz'
      register: dump_files
      loop: '{{ pg_containers.results }}'
      loop_control:
        label: '{{ item.item.name }}'
      when: item.stdout != ''

    # Safe restore: load into temp DB first, then swap via rename.
    # If restore fails, original database stays intact.
    - name: Restore PostgreSQL database — {{ item.0.item.name }}
      ansible.builtin.shell: |
        set -euo pipefail
        CNAME="{{ item.0.stdout }}"
        DB="{{ item.0.item.db }}"
        TMP_DB="${DB}_restore_tmp"
        DUMP="/tmp/restore/postgres/myapp_{{ item.0.item.name }}.sql.gz"

        # Clean up any leftover temp DB from a previous failed run
        docker exec "$CNAME" psql -v ON_ERROR_STOP=1 -U postgres -c "DROP DATABASE IF EXISTS ${TMP_DB}"

        # Create temp DB and restore dump into it
        docker exec "$CNAME" psql -v ON_ERROR_STOP=1 -U postgres -c "CREATE DATABASE ${TMP_DB}"
        zcat "$DUMP" | docker exec -i "$CNAME" psql -v ON_ERROR_STOP=1 -U postgres "${TMP_DB}"

        # Terminate connections to the original DB before swap
        docker exec "$CNAME" psql -v ON_ERROR_STOP=1 -U postgres -c \
          "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = '${DB}' AND pid <> pg_backend_pid()"

        # Swap: drop original, rename temp → original
        docker exec "$CNAME" psql -v ON_ERROR_STOP=1 -U postgres -c "DROP DATABASE IF EXISTS ${DB}"
        docker exec "$CNAME" psql -v ON_ERROR_STOP=1 -U postgres -c "ALTER DATABASE ${TMP_DB} RENAME TO ${DB}"

        echo "Restored: {{ item.0.item.name }} (database: ${DB})"
      args:
        executable: /bin/bash
      register: restore_result
      failed_when: restore_result.rc != 0
      loop: '{{ pg_containers.results | zip(dump_files.results | default([])) | list }}'
      loop_control:
        label: '{{ item.0.item.name }}'
      when:
        - item.0.stdout != ''
        - item.1.stat is defined
        - item.1.stat.exists
