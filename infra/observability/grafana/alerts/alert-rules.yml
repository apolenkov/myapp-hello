# Grafana Cloud Alert Rules for myapp-hello
#
# These rules are designed for Grafana Cloud's Alerting API.
# Apply via: ansible-playbook infra/ansible/setup-grafana-dashboards.yml
#
# Metric names (from apps/api/src/metrics/instruments.ts):
#   - http_request_duration (histogram, seconds)
#   - http_requests (counter)

groups:
  - name: myapp-hello
    folder: myapp-hello
    interval: 1m
    rules:
      - title: High Error Rate (>5%)
        condition: C
        for: 5m
        labels:
          severity: critical
          service: myapp-hello
        annotations:
          summary: 'Error rate exceeds 5% for {{ $labels.job }}'
          description: >-
            More than 5% of HTTP requests are returning 5xx status codes.
            Check application logs and recent deployments.
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: >-
                sum(rate(http_requests_total{job="myapp-hello", http_status_code=~"5.."}[5m]))
              intervalMs: 60000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: grafanacloud-prom
            model:
              expr: >-
                sum(rate(http_requests_total{job="myapp-hello"}[5m]))
              intervalMs: 60000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              type: math
              expression: '$A / $B > 0.05'

      - title: High Latency P95 (>2s)
        condition: B
        for: 5m
        labels:
          severity: warning
          service: myapp-hello
        annotations:
          summary: 'P95 latency exceeds 2 seconds for {{ $labels.job }}'
          description: >-
            95th percentile HTTP request duration is above 2 seconds.
            Check for slow queries, external service degradation, or resource contention.
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: >-
                histogram_quantile(0.95,
                  sum(rate(http_request_duration_bucket{job="myapp-hello"}[5m])) by (le)
                )
              intervalMs: 60000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [2]

      - title: Database Connection Errors
        condition: B
        for: 3m
        labels:
          severity: critical
          service: myapp-hello
        annotations:
          summary: 'Database query errors detected for {{ $labels.job }}'
          description: >-
            PostgreSQL query errors are occurring. Check database connectivity,
            connection pool exhaustion, or migration issues.
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: >-
                sum(rate(db_client_connections_errors_total{job="myapp-hello"}[5m]))
              intervalMs: 60000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]

      - title: Zero Traffic (15min)
        condition: B
        for: 15m
        labels:
          severity: warning
          service: myapp-hello
        annotations:
          summary: 'No traffic detected for {{ $labels.job }} in 15 minutes'
          description: >-
            No HTTP requests received in the last 15 minutes.
            Check DNS resolution, Traefik routing, or service health.
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: >-
                sum(rate(http_requests_total{job="myapp-hello"}[15m]))
              intervalMs: 60000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params: [0.001]
